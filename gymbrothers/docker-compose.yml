services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gymflow_ultra
    ports:
      - "5432:5432"
    volumes:
      - gymflow_pgdata:/var/lib/postgresql/data

volumes:
  gymflow_pgdata:
